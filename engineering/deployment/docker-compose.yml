# Local single-container run of Drydock (API + dashboard in one image).
#   cd engineering/deployment && docker compose up -d --build
#
# Loopback-only by design — reach the dashboard over Tailscale or an SSH tunnel, never publicly.
services:
  drydock:
    build:
      context: ../codebase
      dockerfile: ../deployment/Dockerfile
    container_name: drydock
    ports:
      - "127.0.0.1:8210:8080"
    environment:
      ConnectionStrings__Drydock: "Data Source=/data/drydock.db"
      # Reserved for the secrets cipher (P0 vault feature) — set when wired:
      # DRYDOCK_MASTER_KEY: "${DRYDOCK_MASTER_KEY:-}"
    volumes:
      - drydock-data:/data
    restart: unless-stopped

volumes:
  drydock-data:
